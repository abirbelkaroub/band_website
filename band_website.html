<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Band Website</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        border: 0;
        background-color: rgb(115, 115, 115);
        font-family: "Lato", sans-serif;
      }
      .dropdown {
        display: inline-block;
      }

      nav {
        position: fixed;
        background-color: black;
        width: 100%;
        padding: 10px;
        z-index: 1000;
        top: 0;
      }

      .nav_element_class a {
        color: white;
        text-decoration: none;
        padding: 25px;
      }

      .dropdown button {
        color: white;
        background-color: black;
        padding: 20px;
        font-size: 16px;
        font-family: inherit;
        font-family: "Lato", sans-serif;
        border: none;
      }

      .nav_element_class a:hover,
      .dropdown button:hover {
        background-color: #e6e3e3;
        color: #5e4469;
        cursor: pointer;
      }

      .dropdown:hover .content {
        display: block;
      }

      .dropdown a {
        display: block;
        color: black;
      }

      .dropdown .content {
        display: none;
        position: absolute;
        background-color: white;
        box-shadow: 2px, 2px, 5px, hsl(0, 0%, 95%);
        min-width: 150px;
      }
      /* image */
      .image_group {
        width: 100vw;
        height: 100vh;
        object-fit: cover;
        position: relative;
        z-index: 1;
      }
      /* CSS animation defined by @keyframes is copied from a website  */
      .image {
        position: absolute;
        width: 100%;
        height: 100%;
        opacity: 0;
        animation: show 9s infinite;
      }
      @keyframes show {
        0% {
          opacity: 1;
        }
        33% {
          opacity: 1;
        }
        34% {
          opacity: 0;
        }
        100% {
          opacity: 0;
        }
      }
      .i1 {
        animation-delay: 0s;
      }
      .i2 {
        animation-delay: 3s;
      }
      .i3 {
        animation-delay: 6s;
      }
    </style>
  </head>

  <body>
    <nav>
      <div class="nav_element_class">
        <a href="">HOME</a>
        <a href="">BAND</a>
        <a href="">TOWER</a>
        <a href="">CONTACT</a>
        <div class="dropdown">
          <button>MORE ▼</button>
          <div class="content">
            <a href="marchandise.html">Marchandise</a>
            <a href="extras.html">Extras</a>
            <a href="media.html">Media</a>
          </div>
        </div>
      </div>
    </nav>
    <!-- importing images -->
    <div class="image_group">
      <img src="pictures/1.png" class="image i1" />
      <img src="pictures/2.jpeg" class="image i2" />
      <img src="pictures/3.jpg" class="image i3" />
      <p>text</p>
    </div>
  </body>
</html>
